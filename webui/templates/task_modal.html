<div id="taskModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Новая задача</h3>
        <div class="form-group">
            <label>Название *</label>
            <input type="text" id="taskTitle" placeholder="Купить молоко" required>
        </div>
        <div class="form-group">
            <label>Описание</label>
            <textarea id="taskDesc" rows="3" placeholder="Подробности..."></textarea>
        </div>
        <div class="form-group">
            <label>Дата выполнения</label>
            <input type="date" id="taskDueDate">
        </div>
        <input type="hidden" id="taskId">
        <div class="modal-buttons">
            <button id="modalSaveBtn" class="primary">Сохранить</button>
            <button id="modalDeleteBtn" class="danger" style="display:none;">Удалить</button>
            <button id="modalCancelBtn">Отмена</button>
        </div>
    </div>
</div>
