services:
  taskservice:
    build: ./taskservice
    container_name: taskservice
    command: sh -c "python -m app.api 2>&1 | tee /app/logs/taskservice.log"
    ports:
      - "8081:5000"
    volumes:
      - ./taskservice:/app
      - ./logs:/app/logs
    networks:
      - internal
    # порты не открываем наружу

  webui:
    build: ./webui
    container_name: webui
    volumes:
      - ./logs:/app/logs
      - ./webui/static:/app/static:ro
      - ./webui/templates:/app/templates:ro
    networks:
      - internal
    depends_on:
      - taskservice

  gateway:
    image: nginx:alpine
    container_name: gateway
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - taskservice
      - webui
    networks:
      - internal

networks:
  internal:
    driver: bridge