services:
  taskservice:
    build: ./taskservice
    container_name: taskservice
    volumes:
      - ./taskservice:/app
    networks:
      - internal
    # порты не открываем наружу

  webui:
    build: ./webui
    container_name: webui
    networks:
      - internal
    depends_on:
      - taskservice

  gateway:
    image: nginx:alpine
    container_name: gateway
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - taskservice
      - webui
    networks:
      - internal

networks:
  internal:
    driver: bridge